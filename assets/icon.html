<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2C4A63; }
  body { display: grid; place-items: center; }
  /* 12% safe padding -> art fills the middle 76vmin (maskable-safe) */
  .icon { width: 76vmin; height: 76vmin; display: block; }
  .wrench { fill: #F3ECDD; }
  .stitch { stroke: #E8620C; stroke-width: 2.8; fill: none; stroke-linecap: round; }
</style>
</head>
<body>
  <svg class="icon" viewBox="0 0 48 48" aria-hidden="true">
    <path class="wrench" d="M31 9a9 9 0 0 0-9 11.5L9.5 33a4 4 0 0 0 5.6 5.6L27.6 26A9 9 0 1 0 31 9zm2 6.5a3.2 3.2 0 1 1-4.5 4.5 3.2 3.2 0 0 1 4.5-4.5z"/>
    <path class="stitch" d="M8 42 L42 8" stroke-dasharray="3.2 4.6"/>
  </svg>
</body>
</html>
