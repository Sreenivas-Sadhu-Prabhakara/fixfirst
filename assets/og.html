<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --paper:   #F3ECDD;
    --paper2:  #EBE1CC;
    --card:    #FBF6EA;
    --ink:     #22303A;
    --ink-soft:#4E5C66;
    --line:    #C9BFA6;
    --steel:   #2C4A63;
    --orange:  #C24A00;
    --orange-fill: #E8620C;
    --grid:    rgba(44, 74, 99, 0.09);
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --cond: "Arial Narrow", "Roboto Condensed", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: var(--paper);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  /* blueprint grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(130% 110% at 88% 6%, #000 34%, transparent 82%);
    mask-image: radial-gradient(130% 110% at 88% 6%, #000 34%, transparent 82%);
  }
  .frame {
    position: absolute; inset: 0;
    padding: 84px 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 22px; }
  .mark {
    width: 82px; height: 82px; border-radius: 20px;
    background: var(--steel); padding: 12px;
    box-shadow: 0 22px 50px -24px rgba(34,48,58,0.6);
  }
  .mark .wrench { fill: var(--paper); }
  .mark .stitch { stroke: var(--orange-fill); stroke-width: 2.6; fill: none; stroke-linecap: round; }
  .wordmark {
    font-family: var(--cond); font-weight: 700; letter-spacing: 0.01em;
    font-size: 62px; line-height: 1; text-transform: lowercase; color: var(--ink);
  }

  .headline { max-width: 920px; }
  .headline h1 {
    font-family: var(--cond); font-weight: 700; text-transform: uppercase;
    font-size: 82px; line-height: 1.02; letter-spacing: -0.005em; color: var(--ink);
  }
  .headline .accent {
    color: var(--orange); position: relative; white-space: nowrap;
  }
  .headline .accent::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -10px; height: 5px;
    background: repeating-linear-gradient(90deg, var(--orange-fill) 0 16px, transparent 16px 28px);
  }
  .headline p {
    margin-top: 30px; font-size: 30px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--ink-soft); line-height: 1.35; max-width: 30ch;
  }

  .chips { display: flex; align-items: center; gap: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 12px 22px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--card);
    font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--steel);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 3px; }
  .chip .dot--orange { background: var(--orange-fill); }
  .chip .dot--steel  { background: var(--steel); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <path class="wrench" d="M31 9a9 9 0 0 0-9 11.5L9.5 33a4 4 0 0 0 5.6 5.6L27.6 26A9 9 0 1 0 31 9zm2 6.5a3.2 3.2 0 1 1-4.5 4.5 3.2 3.2 0 0 1 4.5-4.5z"/>
        <path class="stitch" d="M7 43 L43 7" stroke-dasharray="3 4.5"/>
      </svg>
      <span class="wordmark">fixfirst</span>
    </div>

    <div class="headline">
      <h1>Repair it<br>before you <span class="accent">replace it.</span></h1>
      <p>A workshop guide to mending the everyday things that break.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--steel"></span>real steps &amp; tools</span>
      <span class="chip"><span class="dot dot--orange"></span>honest replace advice</span>
      <span class="chip"><span class="dot dot--steel"></span>offline</span>
    </div>
  </div>
</body>
</html>
